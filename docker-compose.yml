services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: uall
      POSTGRES_PASSWORD: uall
      POSTGRES_DB: uall
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrantdata:/qdrant/storage

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
  qdrantdata:
